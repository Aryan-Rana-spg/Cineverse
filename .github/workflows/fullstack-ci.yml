name: Fullstack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  backend-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          [backend/api-gateway, backend/auth-service, backend/movie-service]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build backend service
        run: |
          cd ${{ matrix.service }}
          chmod +x mvnw
          ./mvnw -B -DskipTests package

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Build frontend
        run: |
          cd frontend
          npm run build

server.port=${SERVER_PORT:8080}

# Auth Service Route Configuration
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Movie Service Route Configuration
spring.cloud.gateway.routes[1].id=movie-service
spring.cloud.gateway.routes[1].uri=${MOVIE_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/movies/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Universal CORS Cross-Origin Gateway Permissions
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=${FRONTEND_URL:http://localhost:5173}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true